services:
  # Node.js Backend API
  - type: web
    name: sevee-api
    env: node
    plan: starter
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sevee-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

databases:
  # Managed PostgreSQL Database
  - name: sevee-db
    databaseName: seveedesigns
    user: seveeadmin
    plan: starter
    postgresMajorVersion: 15
